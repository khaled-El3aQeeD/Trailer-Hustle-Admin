name: trailerhustle_admin
description: "A complete dashboard template with charts, metrics, and responsive design using Forui."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  printing: ^5.0.0
  pdf: ^3.0.0
  file_picker: '>=8.1.2'
  supabase_flutter: '>=1.10.0'
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  forui: ^0.14.1      # Design system and UI components
  provider: ^6.1.5    # State management
  fl_chart: 0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
